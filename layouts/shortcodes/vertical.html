{{ $.Scratch.Set "md" false }}

{{ if .IsNamedParams }}
{{ $.Scratch.Set "md" (.Get "md") }}
{{ else }}
{{ $.Scratch.Set "md" (.Get 0) }}
{{ end }}

<div style="display: flex; justify-content: flex-end; width: 100%;">
  <div
    style="writing-mode: vertical-rl; text-orientation: mixed; line-height: 1.5; letter-spacing: 0.2em; max-height: 70vh; overflow-x: auto; padding: 1rem 0;">
    {{ if eq ($.Scratch.Get "md") false }}
    {{ .Inner }}
    {{ else }}
    {{ .Inner | markdownify }}
    {{ end }}
  </div>
</div>
