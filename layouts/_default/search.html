{{- define "main" }}

<header class="page-header">
    <h1 style="text-align: center;">{{- (printf "%s&nbsp;" .Title ) | htmlUnescape -}}
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
    </h1>
    {{- if .Description }}
    <div class="post-description">
        {{ .Description }}
    </div>
    {{- end }}
    {{- if not (.Param "hideMeta") }}
    <div class="post-meta">
        {{- partial "translation_list.html" . -}}
    </div>
    {{- end }}
</header>

<link href="/pagefind/pagefind-ui.css" rel="stylesheet">
<script src="/pagefind/pagefind-ui.js"></script>

<style>
    /* 美化清除按钮 */
    .pagefind-ui__search-clear {
        border-radius: 6px !important;
        padding: 6px 12px !important;
        background: var(--theme) !important;
        color: var(--primary) !important;
        border: 1px solid var(--border) !important;
        font-weight: 500 !important;
        transition: all 0.2s ease !important;
        cursor: pointer !important;
    }
    
    .pagefind-ui__search-clear:hover {
        background: var(--primary) !important;
        color: var(--theme) !important;
        border-color: var(--primary) !important;
        transform: translateY(-1px);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    
    /* 搜索框整体优化 */
    .pagefind-ui__search-input {
        border-radius: 8px !important;
        padding: 12px 16px 12px 44px !important;
    }
    
    .pagefind-ui__search-input:focus {
        outline: none !important;
    }
</style>

<div id="search"></div>

<script>
    window.addEventListener('DOMContentLoaded', (event) => {
        new PagefindUI({
            element: "#search",
            showSubResults: true,
            translations: {
                placeholder: "{{ .Params.placeholder | default (T `search_placeholder`) | default (printf `%s ↵` .Title) }}",
                clear_search: "{{ T `search_clear_search` }}",
                load_more: "{{ T `search_load_more` }}",
                search_label: "{{ T `search_search_label` }}",
                filters_label: "{{ T `search_filters_label` }}",
                zero_results: "{{ T `search_zero_results` }}",
                many_results: "{{ T `search_many_results` }}",
                one_result: "{{ T `search_one_result` }}",
                alt_search: "{{ T `search_alt_search` }}",
                search_suggestion: "{{ T `search_search_suggestion` }}",
                searching: "{{ T `search_searching` }}"
            }
        });
    });
</script>

{{- end }}{{/* end main */}}
