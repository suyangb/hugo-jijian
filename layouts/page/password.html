{{ define "main" }}
<div class="password-container">
    <div class="password-card">
        <div class="icon">🔒</div>
        <h1>内容已锁定</h1>
        <p>该内容受保护，请输入该文章的<br>专属访问密码以继续阅读</p>
        
        <div class="input-group">
            <input type="password" id="pw-input" placeholder="输入密码..." autofocus>
            <button onclick="submitPassword()">验证并解锁</button>
        </div>
        <p id="msg" class="error-msg"></p>
    </div>
</div>

<style>
    .password-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 50vh;
        padding: 20px;
    }
    .password-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        padding: 40px;
        text-align: center;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        color: var(--content);
    }
    .icon { font-size: 3rem; margin-bottom: 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 10px; color: var(--primary); }
    .input-group { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; }
    input {
        background: rgba(128, 128, 128, 0.05); /* 使用更中性的灰色背景 */
        border: 1.5px solid var(--border); /* 使用主题定义的边框色，并加粗一点点 */
        padding: 12px 20px;
        border-radius: 10px;
        color: inherit;
        outline: none;
        transition: 0.3s;
        font-size: 16px; /* 防止移动端输入时自动缩放 */
    }
    input:focus { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
    .password-card button {
        background: #3b82f6;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }
    .password-card button:hover { background: #2563eb; transform: translateY(-2px); }
    .error-msg { color: #ef4444; font-size: 0.85rem; height: 1.2em; margin-top: 15px; font-weight: 500; }

    /* 抖动动画 */
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-6px); }
        20%, 40%, 60%, 80% { transform: translateX(6px); }
    }
    .shake {
        animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
    }

    /* 夜间模式适配 */
    .dark .password-card {
        background: rgba(0, 0, 0, 0.3);
        border-color: rgba(255, 255, 255, 0.1);
    }
</style>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const msg = document.getElementById('msg');
    const card = document.querySelector('.password-card');
    
    // 检查 URL 参数或 Cookie 中的错误标记
    const hasError = urlParams.get('error') === '1' || document.cookie.includes('pw_error=1');
    if (hasError) {
        msg.innerText = "✖ 密码错误，请确认后重试";
        card.classList.add('shake');
        // 清除错误 Cookie
        document.cookie = "pw_error=; Path=/; Max-Age=0; SameSite=Lax";
    }

    function submitPassword() {
        const input = document.getElementById('pw-input').value;
        if (!input) return;

        // 1. 将输入的密码存入临时 Cookie (10秒有效)
        document.cookie = "check_pw=" + encodeURIComponent(input) + "; path=/; max-age=10; SameSite=Lax";
        
        // 2. 跳转回目标文章路径
        // 优先使用 next 参数，如果没有（如 rewrite 模式），则跳回当前路径（即文章路径）
        const nextUrl = urlParams.get('next') || window.location.pathname;
        window.location.href = nextUrl;
    }

    // 支持回车键提交
    document.getElementById('pw-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') submitPassword();
    });
</script>
{{ end }}
